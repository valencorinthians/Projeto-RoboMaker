<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crie sua conta — RoboMaker</title>
    <style>
        :root{
            --bg:#f5f7fb;
            --card:#ffffff;
            --accent:#2a9df4;
            --muted:#666;
            --radius:8px;
        }
        *{box-sizing:border-box}
        body{
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            margin:0;
            background:var(--bg);
            color:#222;
            line-height:1.45;
        }
        header{
            background:var(--accent);
            color:#fff;
            padding:20px 12px;
            text-align:center;
        }
        header h1{margin:0 0 8px 0;font-size:1.4rem}
        nav ul{list-style:none;margin:0;padding:0;display:flex;gap:12px;justify-content:center}
        nav a{color:#fff;text-decoration:none;padding:6px 10px;border-radius:6px;display:inline-block}
        nav a:hover{background:rgba(255,255,255,0.12)}
        main{max-width:800px;margin:20px auto;padding:0 12px}
        section{margin:18px 0}
        section h2{margin:0 0 12px 0;color:var(--accent);border-bottom:2px solid rgba(0,0,0,0.04);padding-bottom:8px}
        article.card{background:var(--card);padding:18px;border-radius:var(--radius);box-shadow:0 6px 18px rgba(23,33,69,0.06)}
        .form-row{margin-bottom:12px}
        label{display:block;margin-bottom:6px;color:#333;font-weight:600}
        input[type="text"],input[type="email"],input[type="password"],select{width:100%;padding:10px;border:1px solid #ddd;border-radius:6px}
        fieldset{border:1px solid #eee;padding:10px;border-radius:6px}
        .radio-group label{display:inline-flex;gap:8px;align-items:center;margin-right:12px}
        button{background:var(--accent);color:#fff;border:none;padding:10px 14px;border-radius:6px;cursor:pointer}
        button:hover{opacity:0.95}
        footer{background:#111827;color:#fff;padding:18px 12px;margin-top:20px;border-top:4px solid rgba(255,255,255,0.03);text-align:center}
        footer img{width:40px;height:auto;margin:6px}
        @media (max-width:520px){
            nav ul{flex-direction:column}
            header{padding:14px}
            main{padding:0 10px}
        }
    </style>
</head>
<body>
    <header>
        <h1>RoboMaker kits educacionais</h1>
        <nav>
            <ul>
                <li><a href="index.html">Categorias</a></li>
                <li><a href="index.html#Produtos">Produtos</a></li>
                <li><a href="index.html#Cursos">Cursos</a></li>
                <li><a href="cadastro.html">Cadastro</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="Cadastro">
            <h2>Crie sua conta</h2>
            <article class="card">
                <form>
                    <div class="form-row">
                        <label for="nome">Nome Completo</label>
                        <input type="text" id="nome" name="nome" placeholder="Seu nome completo" required>
                    </div>

                    <div class="form-row">
                        <label for="email">E-mail</label>
                        <input type="email" id="email" name="email" placeholder="seu@exemplo.com" required>
                    </div>

                    <div class="form-row">
                        <label for="senha">Senha</label>
                        <input type="password" id="senha" name="senha" placeholder="Crie uma senha" required>
                    </div>

                    <fieldset class="form-row">
                        <legend style="font-weight:700;color:var(--muted)">Perfil</legend>
                        <div class="radio-group">
                            <label><input type="radio" name="perfil" value="estudante" required> Estudante</label>
                            <label><input type="radio" name="perfil" value="professor"> Professor / Hobbista</label>
                        </div>
                    </fieldset>

                    <div class="form-row">
                        <label for="trilha">Trilha de Interesse</label>
                        <select id="trilha" name="trilha" required>
                            <option value="">Selecione uma trilha</option>
                            <option value="basica">Robótica Básica</option>
                            <option value="ia">Inteligência Artificial</option>
                            <option value="programacao">Programação</option>
                        </select>
                    </div>

                    <div style="text-align:right">
                        <button type="submit">Cadastrar</button>
                    </div>
                </form>
            </article>
        </section>
    </main>

    <footer>
        <h2>RoboMaker educacional</h2>
        <p>
            &copy; 2026 Valentina Alves
        </p>
        <img src="Facebook.png" alt="facebook logo">
        <img src="instagram.png" alt="instagram logo">
        <img src="youtube.png" alt="youtube logo">
    </footer>
</body>
</html>
