<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crie sua conta</title>
</head>
<body>
</head>

<body>
    <!-- Cabeçalho -->
    <header>
        <h1>Crie sua Conta</h1>
        <nav>
            <a href="index.html">Voltar para a página inicial</a>
        </nav>
    </header>

    <!-- Formulário de Cadastro -->
    <main>
        <section>
            <form>
                <div>
                    <label for="nome">Nome Completo:</label>
                    <input type="text" id="nome" name="nome" required>
                </div>

                <div>
                    <label for="email">E-mail:</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div>
                    <label for="senha">Senha:</label>
                    <input type="password" id="senha" name="senha" required>
                </div>

                <div>
                    <label>Perfil de Aluno:</label>
                    <label>
                        <input type="radio" name="perfil" value="estudante" required>
                        Estudante
                    </label>
                    <label>
                        <input type="radio" name="perfil" value="professor">
                        Professor/Hobbista
                    </label>
                </div>

                <div>
                    <label for="trilha">Trilha de Interesse:</label>
                    <select id="trilha" name="trilha" required>
                        <option value="">Selecione uma trilha</option>
                        <option value="basica">Robótica Básica</option>
                        <option value="ia">Inteligência Artificial</option>
                        <option value="programacao">Programação</option>
                    </select>
                </div>

                <button type="submit">Cadastrar</button>
            </form>
        </section>
    </main>

    <!-- Rodapé -->
    <footer>
        <p>&copy; 2026 RoboMaker Kits Educacionais.</p>
    </footer>   
</body>
</html>
